<!doctype html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Claude Devtools</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link
    href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&family=Fira+Code:wght@400;500&display=swap"
    rel="stylesheet">
  <script src="https://cdn.tailwindcss.com"></script>
  <style>
    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html,
    body,
    #root {
      height: 100%;
      width: 100%;
      overflow: hidden;
    }

    body {
      background: #0a0e1a;
      color: #f1f5f9;
      font-family: 'Inter', ui-sans-serif, system-ui, sans-serif;
    }

    @keyframes spin {
      to {
        transform: rotate(360deg);
      }
    }

    @keyframes glow-pulse {
      0%, 100% { box-shadow: 0 0 8px rgba(129,140,248,0.4); }
      50% { box-shadow: 0 0 16px rgba(129,140,248,0.6); }
    }

    ::-webkit-scrollbar {
      width: 6px;
      height: 6px;
    }

    ::-webkit-scrollbar-track {
      background: #111827;
    }

    ::-webkit-scrollbar-thumb {
      background: #334155;
      border-radius: 3px;
    }

    ::-webkit-scrollbar-thumb:hover {
      background: #475569;
    }

    /* ReactFlow controls dark theme */
    .react-flow__controls-button {
      background: #1a2237 !important;
      border-color: #334155 !important;
      fill: #94a3b8 !important;
    }
    .react-flow__controls-button:hover {
      background: #1e293b !important;
      fill: #f1f5f9 !important;
    }
  </style>
</head>

<body>
  <div id="root"></div>
  <script type="module" src="/src/main.tsx"></script>
</body>

</html>
